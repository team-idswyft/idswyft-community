# ─────────────────────────────────────────────────
# Sync release tags to the public idswyft-community repo.
# ─────────────────────────────────────────────────
# When a v* tag is pushed to this (private) repo, this
# workflow strips cloud code (same as sync-community.yml)
# and pushes the tag to idswyft-community, where it
# triggers the Docker image build.
#
# Required secret:
#   COMMUNITY_REPO_PAT — fine-grained PAT with
#   contents:write + workflows:write on idswyft-community
# ─────────────────────────────────────────────────

name: Sync Release Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  sync-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync tag to community repo
        env:
          COMMUNITY_PAT: ${{ secrets.COMMUNITY_REPO_PAT }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          # Configure git
          git config user.name "idswyft-bot"
          git config user.email "bot@idswyft.app"

          # Delete cloud-only files listed in .community-ignore
          if [ -f .community-ignore ]; then
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              [[ "$file" == \#* ]] && continue
              file="$(echo "$file" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              [ -z "$file" ] && continue
              rm -rf "$file"
            done < .community-ignore
          fi

          # Overlay community versions of files (dotglob ensures .github/ is copied)
          if [ -d community-overrides ]; then
            shopt -s dotglob
            cp -r community-overrides/* .
            shopt -u dotglob
            rm -rf community-overrides
          fi

          # Remove sync infrastructure itself
          rm -f .community-ignore
          rm -rf community-overrides

          # Rewrite GitHub URLs
          LINK_FILES=(
            README.md
            TRADEMARK.md
            install.sh
            frontend/public/llms.txt
            frontend/public/llms-full.txt
            frontend/src/pages/DocsReference.tsx
            backend/src/api-docs/apiDocsMarkdown.ts
            sdks/react/package.json
          )
          for f in "${LINK_FILES[@]}"; do
            [ -f "$f" ] || continue
            sed -i -E 's|team-idswyft/idswyft([^a-z-])|team-idswyft/idswyft-community\1|g; s|team-idswyft/idswyft$|team-idswyft/idswyft-community|g' "$f"
          done

          # Commit stripped code, tag it, and push
          git remote add community "https://x-access-token:${COMMUNITY_PAT}@github.com/team-idswyft/idswyft-community.git"
          git add -A
          git commit -m "sync: mirror from idswyft @ ${TAG}" --allow-empty
          git tag -f "$TAG"
          git push community "HEAD:main" --force
          git push community "$TAG" --force
