# ─────────────────────────────────────────────────
# Build and push Docker images to GitHub Container Registry
# ─────────────────────────────────────────────────
# Triggers:
#   - Push a version tag: git tag v1.2.0 && git push --tags
#   - Manual: Actions tab → "Build & Publish Docker Images" → Run workflow
#
# IMPORTANT: Only tag releases on the main branch (after merging dev → main).
# Tagging on dev or feature branches will publish images from unreleased code.
#
# Images published:
#   ghcr.io/team-idswyft/idswyft-api:<version>
#   ghcr.io/team-idswyft/idswyft-api:latest
#   ghcr.io/team-idswyft/idswyft-engine:<version>
#   ghcr.io/team-idswyft/idswyft-engine:latest
#   ghcr.io/team-idswyft/idswyft-frontend:<version>
#   ghcr.io/team-idswyft/idswyft-frontend:latest
# ─────────────────────────────────────────────────

name: Build & Publish Docker Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. 1.2.0). Defaults to 'latest' if empty."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/team-idswyft/idswyft-api
  ENGINE_IMAGE: ghcr.io/team-idswyft/idswyft-engine
  FRONTEND_IMAGE: ghcr.io/team-idswyft/idswyft-frontend

permissions:
  contents: read
  packages: write

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          # Tag rules:
          # - v1.2.0 tag push → :1.2.0, :1.2, :latest (skips pre-releases like v1.2.0-beta.1)
          # - manual dispatch  → :latest (or custom tag if provided)
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && !contains(github.ref, '-') }}
            type=raw,value=${{ inputs.tag || 'latest' }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-engine:
    name: Build engine image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ENGINE_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && !contains(github.ref, '-') }}
            type=raw,value=${{ inputs.tag || 'latest' }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && !contains(github.ref, '-') }}
            type=raw,value=${{ inputs.tag || 'latest' }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_EDITION=community
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
