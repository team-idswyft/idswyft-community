# ─────────────────────────────────────────────────
# Sync stripped code to the public idswyft-community repo.
# ─────────────────────────────────────────────────
# Triggers on push to main or dev. Reads .community-ignore,
# deletes cloud-only files, overlays community-overrides/,
# then force-pushes to idswyft-community.
#
# Required secret:
#   COMMUNITY_REPO_PAT — fine-grained PAT with contents:write
#   on team-idswyft/idswyft-community
# ─────────────────────────────────────────────────

name: Sync Community Repo

on:
  push:
    branches: [main, dev]

concurrency:
  group: community-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Sync to community repo
        env:
          COMMUNITY_PAT: ${{ secrets.COMMUNITY_REPO_PAT }}
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"

          # Configure git
          git config user.name "idswyft-bot"
          git config user.email "bot@idswyft.app"

          # Delete cloud-only files listed in .community-ignore
          if [ -f .community-ignore ]; then
            while IFS= read -r file; do
              # Skip empty lines and comments
              [ -z "$file" ] && continue
              [[ "$file" == \#* ]] && continue
              # Trim whitespace
              file="$(echo "$file" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              [ -z "$file" ] && continue
              rm -rf "$file"
            done < .community-ignore
          fi

          # Overlay community versions of files (dotglob ensures .github/ is copied)
          if [ -d community-overrides ]; then
            shopt -s dotglob
            cp -r community-overrides/* .
            shopt -u dotglob
            rm -rf community-overrides
          fi

          # Remove sync infrastructure itself
          rm -f .community-ignore
          rm -rf community-overrides

          # Rewrite GitHub URLs: team-idswyft/idswyft → team-idswyft/idswyft-community
          # Regex: match "idswyft/idswyft" NOT followed by "-" (avoids idswyft-vaas, idswyft-community)
          LINK_FILES=(
            README.md
            TRADEMARK.md
            install.sh
            frontend/public/llms.txt
            frontend/public/llms-full.txt
            frontend/src/pages/DocsReference.tsx
            backend/src/api-docs/apiDocsMarkdown.ts
            sdks/react/package.json
          )
          for f in "${LINK_FILES[@]}"; do
            [ -f "$f" ] || continue
            sed -i -E 's|team-idswyft/idswyft([^a-z-])|team-idswyft/idswyft-community\1|g; s|team-idswyft/idswyft$|team-idswyft/idswyft-community|g' "$f"
          done

          # Push to community repo
          git remote add community "https://x-access-token:${COMMUNITY_PAT}@github.com/team-idswyft/idswyft-community.git"
          git add -A
          git commit -m "sync: mirror from idswyft @ ${GITHUB_SHA::8}" --allow-empty
          git push community "HEAD:${BRANCH}" --force
