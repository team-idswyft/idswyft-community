# ─────────────────────────────────────────────────
# CI — Type checking, tests, and build verification
# ─────────────────────────────────────────────────
# Triggers on pull requests targeting main or dev.
# Must pass before PRs can be merged (configure as
# required status check in branch protection rules).
#
# Backend job runs both `tsc --noEmit` and the vitest
# suite. Job name preserved as `typecheck-backend` to
# avoid breaking required-status-check rules; rename
# in a coordinated branch-protection update later.
# ─────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  typecheck-shared:
    name: Typecheck shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: cd shared && npm install
      - run: cd shared && npx tsc --noEmit

  typecheck-backend:
    name: Typecheck backend
    needs: typecheck-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Install from root so npm workspaces resolves @idswyft/shared
      - run: npm install
      # Build shared so backend can resolve its type declarations
      - run: cd shared && npx tsc && npx tsc-alias
      - name: Type-check backend
        run: cd backend && npx tsc --noEmit
      - name: Run backend tests (vitest)
        run: cd backend && npm test -- --run

  typecheck-frontend:
    name: Typecheck frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm install
      - run: cd frontend && npx tsc --noEmit

  typecheck-engine:
    name: Typecheck engine
    needs: typecheck-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Install from root so npm workspaces resolves @idswyft/shared
      - run: npm install
      # Build shared so engine can resolve its type declarations
      - run: cd shared && npx tsc && npx tsc-alias
      - run: cd engine && npx tsc --noEmit
