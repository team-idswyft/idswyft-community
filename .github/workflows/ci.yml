# ─────────────────────────────────────────────────
# CI — Type checking and build verification
# ─────────────────────────────────────────────────
# Triggers on pull requests targeting main or dev.
# Must pass before PRs can be merged (configure as
# required status check in branch protection rules).
# ─────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  typecheck-backend:
    name: Typecheck backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm install
      - run: npx tsc --noEmit

  typecheck-frontend:
    name: Typecheck frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm install
      - run: npx tsc --noEmit

  typecheck-engine:
    name: Typecheck engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: engine/package-lock.json

      - run: npm install
      - run: npx tsc --noEmit
