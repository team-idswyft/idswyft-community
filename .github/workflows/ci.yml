# ─────────────────────────────────────────────────
# CI — Type checking, tests, and build verification
# ─────────────────────────────────────────────────
# Triggers on pull requests AND direct pushes to main/dev.
# Per CLAUDE.md the project's dominant workflow is direct-push-
# to-dev — without the push trigger those changes bypass the
# test gate entirely. Configure as required status check in
# branch protection rules.
#
# Backend job runs both `tsc --noEmit` and the vitest
# suite. Job name preserved as `typecheck-backend` to
# avoid breaking required-status-check rules; rename
# in a coordinated branch-protection update later.
# ─────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  typecheck-shared:
    name: Typecheck shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: cd shared && npm install
      - run: cd shared && npx tsc --noEmit

  typecheck-backend:
    name: Typecheck backend
    needs: typecheck-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Install from root so npm workspaces resolves @idswyft/shared
      - run: npm install
      # Build shared so backend can resolve its type declarations
      - run: cd shared && npx tsc && npx tsc-alias
      - name: Type-check backend
        run: cd backend && npx tsc --noEmit
      - name: Run backend tests (vitest)
        run: cd backend && npm test -- --run

  typecheck-frontend:
    name: Typecheck frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm install
      - run: cd frontend && npx tsc --noEmit

  typecheck-engine:
    name: Typecheck engine
    needs: typecheck-shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # Install from root so npm workspaces resolves @idswyft/shared
      - run: npm install
      # Build shared so engine can resolve its type declarations
      - run: cd shared && npx tsc && npx tsc-alias
      - run: cd engine && npx tsc --noEmit

  # ─── npm audit ────────────────────────────────────────────────
  # Blocks PRs on new high/critical production advisories. Backlog
  # was triaged on 2026-04-27 (see docs/security/2026-04-27-
  # vulnerability-triage.md). After that triage we have zero
  # high/critical findings at production scope (--omit=dev), so
  # this gate fails fast on regressions without immediate friction.
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm install
      - name: Audit backend (production deps only)
        run: cd backend && npm audit --audit-level=high --omit=dev
      - name: Audit engine (production deps only)
        run: cd engine && npm audit --audit-level=high --omit=dev
      - name: Audit frontend (production deps only)
        run: cd frontend && npm audit --audit-level=high --omit=dev
      - name: Audit shared (production deps only)
        run: cd shared && npm audit --audit-level=high --omit=dev
