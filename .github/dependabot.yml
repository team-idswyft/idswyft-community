# ─────────────────────────────────────────────────
# Dependabot configuration
# ─────────────────────────────────────────────────
# Patch and minor bumps are grouped into one weekly PR per
# ecosystem so routine maintenance lands as a single review.
# Major bumps fall through to individual PRs so each
# breaking-change review can be scoped properly.
#
# Workspace packages (@idswyft/*) are ignored since they are
# resolved locally via npm workspaces, not from the registry.
# ─────────────────────────────────────────────────

version: 2

updates:
  # Root + backend + engine (npm workspaces)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      non-major:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "@idswyft/*"
    open-pull-requests-limit: 10

  # Frontend (separate lockfile)
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      non-major:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
