# ─────────────────────────────────────────────────
# Idswyft Community Edition — Self-Hosted Install
# ─────────────────────────────────────────────────
# Quick start:
#   ./install.sh        (interactive setup)
#   docker compose up -d
#   Visit http://localhost
# ─────────────────────────────────────────────────

services:
  # ─────────────────────────────────────────
  # PostgreSQL database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: idswyft
      POSTGRES_USER: idswyft
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme-in-production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idswyft"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Core identity verification API
  # ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://idswyft:${DB_PASSWORD:-changeme-in-production}@postgres:5432/idswyft
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      API_KEY_SECRET: ${API_KEY_SECRET:-change-this-api-key-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-32-char-encrypt-key!}
      SERVICE_TOKEN: ${SERVICE_TOKEN:-change-this-service-token}
      STORAGE_PROVIDER: local
      SANDBOX_MODE: ${SANDBOX_MODE:-false}
    volumes:
      - uploads:/app/uploads
      - temp:/app/temp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # Dev Portal frontend (community edition)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_EDITION: community
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${PORT:-80}:80"

volumes:
  pgdata:
  uploads:
  temp:
